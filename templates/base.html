<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ title }}</title>
<style>{{ theme_css | safe }}</style>
</head>
<body>
<header class="site-header">
  <h1 class="site-title">{{ site_title }}</h1>
  <div class="site-meta">生成: {{ generated_at }}</div>

</html>
