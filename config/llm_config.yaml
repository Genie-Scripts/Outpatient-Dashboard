# Ollama 接続設定
# Ollama を OpenAI互換サーバとして起動し、日本語 instruct モデルをロードすること
# 推奨: Llama-3.1-Swallow-8B-Instruct-v0.5（東工大 Swallow チーム継続事前学習）
#       Q6_K は 64GB Mac 環境向けに品質優先。Q4_K_M でも実用上問題ない。
endpoint: http://localhost:11434/v1/chat/completions
model: hf.co/mmnga/Llama-3.1-Swallow-8B-Instruct-v0.5-gguf:Q6_K
temperature: 0.3
max_tokens: 300
timeout: 120
system_prompt: |
  あなたは病院経営企画室のデータアナリストです。
  経営層向けに、数値データから簡潔で示唆に富むハイライト文を作成します。
  必ず日本語で、各項目につき2〜3文（50〜80字程度）で記述してください。
  与えられた数値以外の推測や創作は絶対にしないでください。
